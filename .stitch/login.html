<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portfolio Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "background-light": "#ffffff",
                        "background-dark": "#111621",
                        "surface-light": "#f8f9fc",
                        "text-main": "#0e121b",
                        "text-muted": "#4e6797",
                        "border-color": "#e2e8f0",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased min-h-screen flex flex-col">
<div class="flex flex-1 w-full min-h-screen overflow-hidden bg-background-light dark:bg-background-dark">
<!-- Left Split: Image (Hidden on mobile, visible on lg screens) -->
<div class="hidden lg:flex w-1/2 relative bg-surface-light items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center bg-no-repeat transition-transform duration-700 hover:scale-105" data-alt="High fashion model face with soft natural lighting beauty shot" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDNUDTShfYRsycptElm5NNhOaefNeFiyoREgpX0GSOFc9GSXXyksiZBEFvGdU8jj-PHTInI2eeaNW40YqjPIyzKiFxrexvEKp6oCvk69FomHnOZoJ7WVBvE7Q8AsT39QR_fcvR1xdDHDT_8wxVKW4FPIlvVsQatbtvTgt85IkvNvORP1zwm-Uo5AMs2uh724IGbmvvMZWYm6NvnJZCILmgO2FtwhTkhxbcs7ZAjZVJaDmnwq05Hgw6n15-bflgan37g1YKGa8wjLbo");'>
<div class="absolute inset-0 bg-black/10"></div>
</div>
<!-- Optional Overlay Text for Brand Mood -->
<div class="relative z-10 p-12 text-white text-center opacity-0 hover:opacity-100 transition-opacity duration-500">
<p class="font-serif text-3xl italic tracking-wide">Redefining Beauty.</p>
</div>
</div>
<!-- Right Split: Login Form -->
<div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-6 sm:p-12 lg:p-24 bg-background-light dark:bg-background-dark relative">
<div class="w-full max-w-[420px] flex flex-col gap-10">
<!-- Header / Logo -->
<div class="text-center flex flex-col items-center gap-2">
<h1 class="text-4xl sm:text-5xl font-serif text-text-main font-bold tracking-tight mb-2">Portfolio</h1>
<p class="text-text-muted text-sm sm:text-base font-normal">Welcome back. Please enter your details.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-text-main" for="email">Email</label>
<div class="relative group">
<input class="w-full px-4 py-3.5 bg-white dark:bg-background-dark border border-border-color rounded-lg text-text-main text-base placeholder:text-text-muted/60 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none" id="email" placeholder="name@example.com" type="email"/>
<div class="absolute right-3 top-3.5 text-text-muted pointer-events-none group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</div>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-text-main" for="password">Password</label>
<div class="relative group">
<input class="w-full px-4 py-3.5 bg-white dark:bg-background-dark border border-border-color rounded-lg text-text-main text-base placeholder:text-text-muted/60 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none" id="password" placeholder="••••••••" type="password"/>
<div class="absolute right-3 top-3.5 text-text-muted cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</div>
</div>
</div>
<!-- Forgot Password & Remember Me (Optional addition for UX) -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-4 w-4 appearance-none rounded border border-border-color bg-white checked:bg-primary checked:border-primary transition-all cursor-pointer" type="checkbox"/>
<span class="absolute text-white opacity-0 peer-checked:opacity-100 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none material-symbols-outlined" style="font-size: 12px;">check</span>
</div>
<span class="text-sm text-text-muted group-hover:text-text-main transition-colors">Remember me</span>
</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 hover:underline transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold h-12 rounded-lg shadow-lg shadow-primary/20 transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2 group">
<span>Sign In</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" style="font-size: 18px;">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative my-2">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-border-color"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-light dark:bg-background-dark px-2 text-text-muted">Or continue with</span>
</div>
</div>
<!-- Social Login (Optional but fits standard patterns) -->
<button class="w-full bg-white dark:bg-background-dark border border-border-color hover:bg-surface-light text-text-main font-medium h-12 rounded-lg transition-colors flex items-center justify-center gap-3">
<img alt="Google" class="w-5 h-5" data-alt="Google G logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXIuXe6oyMbhSk08HYKGK7QqzQZP0EXTXz-Jdtp7YYuGW0KavgKaDMkXIbkkkPNKS3cgQacmCtq5Uxnwf42mLKCmSj5urSRqcy4VpshfybrxYn1D4kTWOaY-CxY3LqV_AkrniNUeH9vOa2wMEy7rqTX0wEV7FTehCHz8fDr144A62K8wH-k_hh1Aip9fZOVEcJGRVHY37ptpOF5ZPf80maJeedrxkyH56TcgrUFoDpCx1xCz97RUEQUS33XSWkZaCvuHFa19bG-Zc"/>
<span>Sign in with Google</span>
</button>
</form>
<!-- Footer -->
<div class="text-center mt-4">
<p class="text-text-muted text-sm">
                        New to Portfolio? 
                        <a class="font-semibold text-primary hover:text-primary/80 transition-colors ml-1" href="#">Create an Account</a>
</p>
</div>
</div>
<!-- Absolute Footer Copyright -->
<div class="absolute bottom-6 text-center w-full px-6">
<p class="text-xs text-text-muted/60">
                    © 2024 Portfolio Beauty. All rights reserved.
                </p>
</div>
</div>
</div>
</body></html>
